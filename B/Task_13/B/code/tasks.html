<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyQuest — Quests</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ========== NAVIGATION ========== -->
  <nav class="navbar">
    <div class="container">
      <div class="nav-brand">
        <span class="brand-icon">⚔️</span>
        <span>StudyQuest</span>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">📊 Dashboard</a></li>
        <li><a href="tasks.html">📜 Quests</a></li>
        <li><a href="profile.html">👤 Profile</a></li>
      </ul>
    </div>
  </nav>

  <!-- ========== MAIN ========== -->
  <main class="container">

    <!-- Page Header -->
    <div class="page-header">
      <h1>📜 Quests</h1>
      <p>Complete tasks to earn XP and level up!</p>
    </div>

    <!-- Quest Counter -->
    <div style="text-align:right;margin-bottom:16px;color:var(--text-secondary);font-size:0.9rem;" id="quest-counter">
      0 / 0 completed
    </div>

    <!-- Quest List -->
    <div class="card">
      <div class="card-title">⚔️ Active &amp; Completed Quests</div>
      <div class="quest-list" id="quest-list">
        <!-- Populated by JavaScript -->
      </div>
    </div>

  </main>

  <!-- ========== FOOTER ========== -->
  <footer class="footer">
    <div class="container">
      StudyQuest &mdash; Level up your learning ⚔️
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
