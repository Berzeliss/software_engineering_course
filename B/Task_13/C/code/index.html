<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyQuest — Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ========== NAVIGATION ========== -->
  <nav class="navbar">
    <div class="container">
      <div class="nav-brand">
        <span class="brand-icon">⚔️</span>
        <span>StudyQuest</span>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">📊 Dashboard</a></li>
        <li><a href="tasks.html">📜 Quests</a></li>
        <li><a href="profile.html">👤 Profile</a></li>
      </ul>
    </div>
  </nav>

  <!-- ========== MAIN ========== -->
  <main class="container">

    <!-- Page Header -->
    <div class="page-header">
      <h1>📋 Dashboard</h1>
      <p>Your adventure awaits, hero!</p>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon">🎮</div>
        <div class="stat-value" id="level-display">0</div>
        <div class="stat-label">Current Level</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🔥</div>
        <div class="stat-value" id="streak-display">0</div>
        <div class="stat-label">Day Streak</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⭐</div>
        <div class="stat-value" id="completed-count">0</div>
        <div class="stat-label">Quests Done</div>
      </div>
    </div>

    <!-- XP Progress -->
    <div class="card xp-section">
      <div class="card-title">✨ Experience Points</div>
      <div class="xp-header">
        <span class="xp-text">Level <strong id="level-label">0</strong></span>
        <span class="xp-text" id="xp-text">0 / 500 XP</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="xp-fill" style="width:0%;"></div>
      </div>
    </div>

    <!-- Active Tasks -->
    <div class="card">
      <div class="card-title">📜 Active Quests</div>
      <div class="quest-list" id="active-tasks-list">
        <!-- Populated by JavaScript -->
      </div>
    </div>

  </main>

  <!-- ========== FOOTER ========== -->
  <footer class="footer">
    <div class="container">
      StudyQuest &mdash; Level up your learning ⚔️
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
